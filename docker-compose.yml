networks:
  base_infra_internal-net:
    external: true

services:
  api:
    build: .
    container_name: zendesk-agent-api-1
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    networks:
      - base_infra_internal-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/webhook/conversations" ]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    container_name: zendesk-agent-worker-1
    command: uv run arq app.worker.WorkerSettings
    env_file: .env
    networks:
      - base_infra_internal-net
    restart: unless-stopped
